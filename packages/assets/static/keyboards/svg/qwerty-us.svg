<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" class="keyboard-svg qwerty-us">
  <!-- Number Row -->
  <g class="row row-0">
    <g class="key" data-code="Backquote"><rect x="20" y="20" width="50" height="50" rx="2"/><text x="45" y="50" class="key-char" text-anchor="middle">`</text><text x="45" y="32" class="key-shift" text-anchor="middle">~</text></g>
    <g class="key" data-code="Digit1"><rect x="74" y="20" width="50" height="50" rx="2"/><text x="99" y="50" class="key-char" text-anchor="middle">1</text><text x="99" y="32" class="key-shift" text-anchor="middle">!</text></g>
    <g class="key" data-code="Digit2"><rect x="128" y="20" width="50" height="50" rx="2"/><text x="153" y="50" class="key-char" text-anchor="middle">2</text><text x="153" y="32" class="key-shift" text-anchor="middle">@</text></g>
    <g class="key" data-code="Digit3"><rect x="182" y="20" width="50" height="50" rx="2"/><text x="207" y="50" class="key-char" text-anchor="middle">3</text><text x="207" y="32" class="key-shift" text-anchor="middle">#</text></g>
    <g class="key" data-code="Digit4"><rect x="236" y="20" width="50" height="50" rx="2"/><text x="261" y="50" class="key-char" text-anchor="middle">4</text><text x="261" y="32" class="key-shift" text-anchor="middle">$</text></g>
    <g class="key" data-code="Digit5"><rect x="290" y="20" width="50" height="50" rx="2"/><text x="315" y="50" class="key-char" text-anchor="middle">5</text><text x="315" y="32" class="key-shift" text-anchor="middle">%</text></g>
    <g class="key" data-code="Digit6"><rect x="344" y="20" width="50" height="50" rx="2"/><text x="369" y="50" class="key-char" text-anchor="middle">6</text><text x="369" y="32" class="key-shift" text-anchor="middle">^</text></g>
    <g class="key" data-code="Digit7"><rect x="398" y="20" width="50" height="50" rx="2"/><text x="423" y="50" class="key-char" text-anchor="middle">7</text><text x="423" y="32" class="key-shift" text-anchor="middle">&</text></g>
    <g class="key" data-code="Digit8"><rect x="452" y="20" width="50" height="50" rx="2"/><text x="477" y="50" class="key-char" text-anchor="middle">8</text><text x="477" y="32" class="key-shift" text-anchor="middle">*</text></g>
    <g class="key" data-code="Digit9"><rect x="506" y="20" width="50" height="50" rx="2"/><text x="531" y="50" class="key-char" text-anchor="middle">9</text><text x="531" y="32" class="key-shift" text-anchor="middle">(</text></g>
    <g class="key" data-code="Digit0"><rect x="560" y="20" width="50" height="50" rx="2"/><text x="585" y="50" class="key-char" text-anchor="middle">0</text><text x="585" y="32" class="key-shift" text-anchor="middle">)</text></g>
    <g class="key" data-code="Minus"><rect x="614" y="20" width="50" height="50" rx="2"/><text x="639" y="50" class="key-char" text-anchor="middle">-</text><text x="639" y="32" class="key-shift" text-anchor="middle">_</text></g>
  </g>
  
  <!-- Top Row (QWERTY) -->
  <g class="row row-1">
    <g class="key finger-left-pinky" data-code="KeyQ"><rect x="30" y="74" width="50" height="50" rx="2"/><text x="55" y="104" class="key-char" text-anchor="middle">q</text></g>
    <g class="key finger-left-ring" data-code="KeyW"><rect x="84" y="74" width="50" height="50" rx="2"/><text x="109" y="104" class="key-char" text-anchor="middle">w</text></g>
    <g class="key finger-left-middle" data-code="KeyE"><rect x="138" y="74" width="50" height="50" rx="2"/><text x="163" y="104" class="key-char" text-anchor="middle">e</text></g>
    <g class="key finger-left-index" data-code="KeyR"><rect x="192" y="74" width="50" height="50" rx="2"/><text x="217" y="104" class="key-char" text-anchor="middle">r</text></g>
    <g class="key finger-left-index" data-code="KeyT"><rect x="246" y="74" width="50" height="50" rx="2"/><text x="271" y="104" class="key-char" text-anchor="middle">t</text></g>
    <g class="key finger-right-index" data-code="KeyY"><rect x="300" y="74" width="50" height="50" rx="2"/><text x="325" y="104" class="key-char" text-anchor="middle">y</text></g>
    <g class="key finger-right-index" data-code="KeyU"><rect x="354" y="74" width="50" height="50" rx="2"/><text x="379" y="104" class="key-char" text-anchor="middle">u</text></g>
    <g class="key finger-right-middle" data-code="KeyI"><rect x="408" y="74" width="50" height="50" rx="2"/><text x="433" y="104" class="key-char" text-anchor="middle">i</text></g>
    <g class="key finger-right-ring" data-code="KeyO"><rect x="462" y="74" width="50" height="50" rx="2"/><text x="487" y="104" class="key-char" text-anchor="middle">o</text></g>
    <g class="key finger-right-pinky" data-code="KeyP"><rect x="516" y="74" width="50" height="50" rx="2"/><text x="541" y="104" class="key-char" text-anchor="middle">p</text></g>
  </g>
  
  <!-- Home Row (ASDF) -->
  <g class="row row-2">
    <g class="key finger-left-pinky" data-code="KeyA"><rect x="40" y="128" width="50" height="50" rx="2"/><text x="65" y="158" class="key-char" text-anchor="middle">a</text></g>
    <g class="key finger-left-ring" data-code="KeyS"><rect x="94" y="128" width="50" height="50" rx="2"/><text x="119" y="158" class="key-char" text-anchor="middle">s</text></g>
    <g class="key finger-left-middle" data-code="KeyD"><rect x="148" y="128" width="50" height="50" rx="2"/><text x="173" y="158" class="key-char" text-anchor="middle">d</text></g>
    <g class="key finger-left-index" data-code="KeyF"><rect x="202" y="128" width="50" height="50" rx="2"/><text x="227" y="158" class="key-char" text-anchor="middle">f</text></g>
    <g class="key finger-left-index" data-code="KeyG"><rect x="256" y="128" width="50" height="50" rx="2"/><text x="281" y="158" class="key-char" text-anchor="middle">g</text></g>
    <g class="key finger-right-index" data-code="KeyH"><rect x="310" y="128" width="50" height="50" rx="2"/><text x="335" y="158" class="key-char" text-anchor="middle">h</text></g>
    <g class="key finger-right-index" data-code="KeyJ"><rect x="364" y="128" width="50" height="50" rx="2"/><text x="389" y="158" class="key-char" text-anchor="middle">j</text></g>
    <g class="key finger-right-middle" data-code="KeyK"><rect x="418" y="128" width="50" height="50" rx="2"/><text x="443" y="158" class="key-char" text-anchor="middle">k</text></g>
    <g class="key finger-right-ring" data-code="KeyL"><rect x="472" y="128" width="50" height="50" rx="2"/><text x="497" y="158" class="key-char" text-anchor="middle">l</text></g>
  </g>
  
  <!-- Bottom Row (ZXCV) -->
  <g class="row row-3">
    <g class="key finger-left-pinky" data-code="KeyZ"><rect x="55" y="182" width="50" height="50" rx="2"/><text x="80" y="212" class="key-char" text-anchor="middle">z</text></g>
    <g class="key finger-left-ring" data-code="KeyX"><rect x="109" y="182" width="50" height="50" rx="2"/><text x="134" y="212" class="key-char" text-anchor="middle">x</text></g>
    <g class="key finger-left-middle" data-code="KeyC"><rect x="163" y="182" width="50" height="50" rx="2"/><text x="188" y="212" class="key-char" text-anchor="middle">c</text></g>
    <g class="key finger-left-index" data-code="KeyV"><rect x="217" y="182" width="50" height="50" rx="2"/><text x="242" y="212" class="key-char" text-anchor="middle">v</text></g>
    <g class="key finger-left-index" data-code="KeyB"><rect x="271" y="182" width="50" height="50" rx="2"/><text x="296" y="212" class="key-char" text-anchor="middle">b</text></g>
    <g class="key finger-right-index" data-code="KeyN"><rect x="325" y="182" width="50" height="50" rx="2"/><text x="350" y="212" class="key-char" text-anchor="middle">n</text></g>
    <g class="key finger-right-index" data-code="KeyM"><rect x="379" y="182" width="50" height="50" rx="2"/><text x="404" y="212" class="key-char" text-anchor="middle">m</text></g>
  </g>
  
  <!-- Space Bar -->
  <g class="row row-4">
    <g class="key finger-thumb" data-code="Space"><rect x="200" y="236" width="300" height="40" rx="2"/><text x="350" y="260" class="key-char" text-anchor="middle">space</text></g>
  </g>
  
  <style>
    .key rect { fill: #1d2025; stroke: #32353b; stroke-width: 1; }
    .key-char { fill: #e1e2ea; font-family: 'Space Grotesk', monospace; font-size: 14px; }
    .key-shift { fill: #e1e2ea; opacity: 0.6; font-family: 'Space Grotesk', monospace; font-size: 10px; }
    .key:hover rect { fill: #272a30; }
    .key.highlighted rect { fill: #ffc56c; filter: drop-shadow(0 0 8px rgba(255, 197, 108, 0.5)); }
    .key.pressed rect { fill: #f0a500; }
    .finger-left-pinky rect { border-left: 2px solid #ff6b6b; }
    .finger-left-ring rect { border-left: 2px solid #ffa94d; }
    .finger-left-middle rect { border-left: 2px solid #ffd43b; }
    .finger-left-index rect { border-left: 2px solid #69db7c; }
    .finger-right-index rect { border-right: 2px solid #4dabf7; }
    .finger-right-middle rect { border-right: 2px solid #748ffc; }
    .finger-right-ring rect { border-right: 2px solid #da77f2; }
    .finger-right-pinky rect { border-right: 2px solid #f783ac; }
  </style>
</svg>
